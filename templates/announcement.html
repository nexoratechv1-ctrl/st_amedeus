<!-- templates/announcements.html -->
{% extends "base.html" %}
{% block content %}
<div class="container">
    <h1 class="page-title">📢 School Announcements</h1>
    <div id="announcementsList" class="announcements-grid"></div>
</div>
<script>
    async function loadAnnouncements() {
        const res = await fetch('/api/announcements');
        const anns = await res.json();
        const container = document.getElementById('announcementsList');
        container.innerHTML = anns.map(a => `
            <div class="announcement-card">
                ${a.image ? `<img src="${a.image}" alt="announcement">` : ''}
                <h3>${a.title}</h3>
                <p>${a.content}</p>
                <small>${new Date(a.created_at).toDateString()}</small>
            </div>
        `).join('');
    }
    loadAnnouncements();
</script>
{% endblock %}
