<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. Joseph's Catholic School - Moshi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="glass-bg"></div>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="School Logo" onerror="this.src='https://placehold.co/60x60?text=St.Joseph'">
                <span>St. Joseph's Moshi</span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="/gallery"><i class="fas fa-images"></i> Gallery</a></li>
                <li><a href="/announcements"><i class="fas fa-bullhorn"></i> Announcements</a></li>
                <li><a href="/apply"><i class="fas fa-pen-alt"></i> Apply</a></li>
                <li><a href="/results"><i class="fas fa-chart-line"></i> Results</a></li>
                <li><a href="/admin/login"><i class="fas fa-user-shield"></i> Admin</a></li>
                <li><a href="/staff/login"><i class="fas fa-chalkboard-user"></i> Staff</a></li>
            </ul>
            <div class="menu-toggle" id="mobileMenu">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        // Mobile menu
        const menuToggle = document.getElementById('mobileMenu');
        const navLinks = document.getElementById('navLinks');
        if(menuToggle) menuToggle.addEventListener('click', () => navLinks.classList.toggle('active'));
    </script>
</body>
</html>
