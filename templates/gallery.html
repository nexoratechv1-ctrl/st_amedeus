{% extends "base.html" %}
{% block content %}
<div class="container mt-5 pt-5">
    <div class="section-title"><h2>Gallery</h2></div>
    <div class="gallery-grid row">{% for item in gallery_items %}<div class="col-md-4 mb-4"><div class="gallery-item">{% if item.media_type == 'image' %}<img src="{{ item.url }}" class="img-fluid">{% else %}<iframe src="{{ item.url }}"></iframe>{% endif %}<div class="p-3"><h5>{{ item.title }}</h5><p>{{ item.description }}</p></div></div></div>{% else %}<p>Hakuna picha.</p>{% endfor %}</div>
</div>
{% endblock %}
