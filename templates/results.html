<!-- templates/results.html -->
{% extends "base.html" %}
{% block content %}
<div class="container">
    <h1>Student Results Portal</h1>
    <div class="glass-card search-box">
        <input type="text" id="indexSearch" placeholder="Enter Index Number (e.g., 2024-001)">
        <button id="searchBtn" class="btn-primary">Fetch Results</button>
    </div>
    <div id="resultsDisplay"></div>
    <div id="commentsSection" style="display:none;"><textarea id="commentText" placeholder="Leave a comment/suggestion..."></textarea><button id="postComment">Post Comment</button></div>
</div>
<script>
    let currentStudentIndex = '';
    let currentResults = [];
    document.getElementById('searchBtn').onclick = async () => {
        const idx = document.getElementById('indexSearch').value;
        if(!idx) return;
        currentStudentIndex = idx;
        const res = await fetch(`/api/results/student/${idx}`);
        if(!res.ok) { alert('Student not found'); return; }
        const data = await res.json();
        currentResults = data.results;
        renderResults(data.student, data.results);
        document.getElementById('commentsSection').style.display = 'block';
    };
    function renderResults(student, results) {
        const container = document.getElementById('resultsDisplay');
        if(results.length===0){ container.innerHTML='<div class="glass-card">No results uploaded yet.</div>'; return; }
        let html = `<div class="student-header"><h3>${student.name} (${student.index}) - ${student.class}</h3></div>`;
        results.forEach(r => {
            html += `<div class="result-card"><h4>${r.exam_type} | ${r.form} | Term ${r.term} ${r.year}</h4>
                    <p>Total: ${r.total} | Avg: ${r.average.toFixed(1)} | Division: ${r.division} | Position: ${r.position}</p>
                    <button onclick="showAiComment(${r.id})">AI Comment & Advice</button>
                    <button onclick="downloadPDF(${r.id})">Download PDF Slip</button>
                    <div id="aiComment-${r.id}"></div></div>`;
        });
        container.innerHTML = html;
        // Chart comparison (past vs current)
        if(results.length>=2){
            let ctx = document.createElement('canvas');
            ctx.id='compChart';
            container.appendChild(ctx);
            const labels = results.map(r=>r.exam_type);
            const totals = results.map(r=>r.total);
            new Chart(ctx, { type:'line', data:{ labels, datasets:[{ label:'Total Marks', data:totals, borderColor:'#3B82F6' }] } });
        }
    }
    window.showAiComment = async (rid) => {
        const resp = await fetch(`/api/ai_comment/${rid}`);
        const ai = await resp.json();
        document.getElementById(`aiComment-${rid}`).innerHTML = `<div class="ai-bubble">🤖 ${ai.ai_comment}</div>`;
    };
    window.downloadPDF = (rid) => {
        const element = document.getElementById(`aiComment-${rid}`).parentElement;
        html2pdf().from(element).save('result_slip.pdf');
    };
    document.getElementById('postComment')?.addEventListener('click', async () => {
        const comment = document.getElementById('commentText').value;
        await fetch('/api/comments', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ student_index:currentStudentIndex, comment, suggestion:'' }) });
        alert('Comment submitted');
    });
</script>
{% endblock %}
