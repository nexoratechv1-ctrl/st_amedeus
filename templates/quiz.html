{% extends "base.html" %}
{% block content %}
<div class="container mt-5 pt-5">
    <div class="section-title"><h2>Jaribu Maarifa Yako</h2><p>Swali la kila siku</p></div>
    {% if question %}
    <div class="row"><div class="col-md-8 mx-auto">
        <div class="card"><div class="card-body">
            <h4 class="text-gold">{{ question.question }}</h4>
            <form method="POST">
                <input type="hidden" name="q_id" value="{{ question.id }}">
                <div class="form-check"><input class="form-check-input" type="radio" name="answer" value="A" id="optA"><label class="form-check-label" for="optA">{{ question.option_a }}</label></div>
                <div class="form-check"><input class="form-check-input" type="radio" name="answer" value="B" id="optB"><label class="form-check-label" for="optB">{{ question.option_b }}</label></div>
                <div class="form-check"><input class="form-check-input" type="radio" name="answer" value="C" id="optC"><label class="form-check-label" for="optC">{{ question.option_c }}</label></div>
                <div class="form-check"><input class="form-check-input" type="radio" name="answer" value="D" id="optD"><label class="form-check-label" for="optD">{{ question.option_d }}</label></div>
                <button type="submit" class="btn btn-gold mt-3">Jibu</button>
            </form>
            {% if feedback %}
            <div class="alert alert-info mt-3">{{ feedback|safe }}</div>
            {% endif %}
        </div></div>
    </div></div>
    {% else %}
    <p>Hakuna maswali kwa sasa. Rudi baadaye.</p>
    {% endif %}
</div>
{% endblock %}
