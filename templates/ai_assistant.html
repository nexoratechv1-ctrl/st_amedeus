{% extends "base.html" %}
{% block content %}
<div class="container mt-5 pt-5"><div class="section-title"><h2><i class="fas fa-robot"></i> AI Assistant</h2><p>Muulize chochote kuhusu elimu, maisha, au shule.</p></div><div class="row"><div class="col-lg-8 mx-auto"><div class="card"><div class="card-body"><form method="POST"><div class="mb-3"><textarea name="user_input" rows="3" class="form-control" required placeholder="Mfano: Ninavyoweza kufaulu mitihani?"></textarea></div><button type="submit" class="btn btn-gold w-100"><i class="fas fa-paper-plane"></i> Tuma Swali</button></form>{% if response %}<hr><div class="mt-4"><h5 class="text-gold">Jibu:</h5><div class="p-3" style="background:rgba(255,215,0,0.05); border-radius:15px;"><p>{{ response|replace('\n','<br>')|safe }}</p></div></div>{% endif %}</div></div></div></div></div>
{% endblock %}
