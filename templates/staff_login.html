<!-- templates/staff_login.html -->
{% extends "base.html" %}
{% block content %}
<div class="container auth-container" style="max-width: 500px; margin: 5rem auto;">
    <div class="glass-card" style="text-align: center;">
        <div style="margin-bottom: 1.5rem;">
            <i class="fas fa-chalkboard-user" style="font-size: 4rem; background: linear-gradient(135deg, #3B82F6, #8B5CF6); -webkit-background-clip: text; background-clip: text; color: transparent;"></i>
        </div>
        <h2 style="margin-bottom: 1.5rem;">Staff Login Portal</h2>
        <p style="color: #94a3b8; margin-bottom: 1.5rem;">Enter your credentials to access the staff panel</p>
        
        <div class="form-group">
            <input type="text" id="username" placeholder="Username" style="width: 100%; padding: 14px; background: rgba(20,20,40,0.7); border: 1px solid #2d3748; border-radius: 16px; color: white; margin-bottom: 1rem;">
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="Password" style="width: 100%; padding: 14px; background: rgba(20,20,40,0.7); border: 1px solid #2d3748; border-radius: 16px; color: white; margin-bottom: 1.5rem;">
        </div>
        
        <button onclick="login()" class="btn-primary" style="width: 100%;">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
        
        <p style="margin-top: 1.5rem; font-size: 0.85rem; color: #64748b;">
            <i class="fas fa-lock"></i> Secure access only for authorized staff
        </p>
        
        <div id="errorMsg" style="color: #ef4444; margin-top: 1rem; display: none;"></div>
    </div>
</div>

<script>
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        
        if (!username || !password) {
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Please enter both username and password';
            return;
        }
        
        try {
            const response = await fetch('/api/staff/auth', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    username: username, 
                    password: password 
                })
            });
            
            const data = await response.json();
            
            if (response.ok && data.token) {
                // Save token and redirect
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', 'staff');
                localStorage.setItem('username', username);
                window.location.href = '/staff/dashboard';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '<i class="fas fa-times-circle"></i> Invalid username or password. Please try again.';
            }
        } catch (error) {
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = '<i class="fas fa-network-wired"></i> Network error. Please check your connection.';
        }
    }
    
    // Allow Enter key to submit
    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            login();
        }
    });
    document.getElementById('username').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            login();
        }
    });
</script>

<style>
    /* Additional styles specific to login pages */
    .auth-container {
        animation: fadeInUp 0.6s ease-out;
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #3B82F6;
        box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    
    .btn-primary {
        transition: all 0.3s ease;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px rgba(59,130,246,0.3);
    }
</style>
{% endblock %}
