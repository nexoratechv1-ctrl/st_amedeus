
<!-- templates/staff_dashboard.html -->
{% extends "base.html" %}
{% block content %}
<div class="staff-dashboard">
    <h1>Staff Panel</h1>
    <div class="staff-actions">
        <button onclick="showStaffSection('addStudent')">Add Student</button>
        <button onclick="showStaffSection('addResult')">Add/Edit Result</button>
        <button onclick="showStaffSection('viewResults')">View & Export PDF</button>
    </div>
    <div id="addStudent" class="staff-section"><h3>Add Student</h3><input id="idxNum" placeholder="Index Number (e.g. 2024-001)"><input id="sName" placeholder="Full Name (Three names)"><input id="parentName" placeholder="Parent Name"><select id="classLevel"><option>Form I</option><option>Form II</option><option>Form III</option><option>Form IV</option></select><button onclick="addStudent()">Create Student</button></div>
    <div id="addResult" class="staff-section" style="display:none;"><select id="studentSelect"></select><select id="examType"><option>Opening Test</option><option>Midterm</option><option>Terminal</option><option>Mock</option><option>FTNA</option><option>CSEE</option></select><div id="subjectMarksContainer"></div><button onclick="saveResult()">Save Result (auto calc total/avg/div)</button></div>
    <div id="viewResults" class="staff-section" style="display:none;"><select id="studentSearchList"></select><button onclick="fetchAndShowStaffResults()">Show Results & Export PDF</button><div id="staffResultsList"></div></div>
</div>
<script>
    const token = localStorage.getItem('token');
    if(!token) window.location='/staff/login';
    async function loadStudentsForStaff(){ const res=await fetch('/api/students',{headers:{'Authorization':`Bearer ${token}`}}); const students=await res.json(); populateSelect(students); }
    function populateSelect(students){ const sel=document.getElementById('studentSelect'); const search=document.getElementById('studentSearchList'); sel.innerHTML=search.innerHTML=students.map(s=>`<option value="${s.id}" data-index="${s.index_number}">${s.name} (${s.index_number})</option>`).join(''); }
    async function addStudent(){ const data={ index_number:document.getElementById('idxNum').value, name:document.getElementById('sName').value, parent_name:document.getElementById('parentName').value, class_level:document.getElementById('classLevel').value }; await fetch('/api/students',{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(data)}); alert('Student added'); }
    document.getElementById('studentSelect').addEventListener('change',()=>{ const form=document.getElementById('studentSelect').selectedOptions[0].parentElement; const classLevel=form.options[form.selectedIndex]?.text.split(' ').pop(); loadSubjectsForForm(classLevel); });
    function loadSubjectsForForm(form){ fetch('/api/subjects')?.then(r=>r.json()).then(subs=>{ let subsHtml=''; subs.filter(s=>s.form===form).forEach(sub=>{ subsHtml+=`<label>${sub.subject_name}: <input type="number" class="subject-mark" data-sub="${sub.subject_name}"></label>`; }); document.getElementById('subjectMarksContainer').innerHTML=subsHtml; }); }
    async function saveResult(){ const studentId=document.getElementById('studentSelect').value; const examType=document.getElementById('examType').value; const marks={}; document.querySelectorAll('.subject-mark').forEach(inp=>{ if(inp.value) marks[inp.getAttribute('data-sub')]=parseFloat(inp.value); }); const payload={ student_id:studentId, exam_type:examType, form:'Form IV', year:2025, marks:marks }; await fetch('/api/results',{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(payload)}); alert('Result saved'); }
    async function fetchAndShowStaffResults(){ const studentId=document.getElementById('studentSearchList').value; const res=await fetch(`/api/results/student?id=${studentId}`); const data=await res.json(); let html=''; data.results.forEach(r=>{ html+=`<div id="slip-${r.id}"><h4>${r.exam_type}</h4><p>Total:${r.total}, Avg:${r.average}, Division:${r.division}</p><button onclick="exportSlipPDF(${r.id})">Export PDF</button></div>`; }); document.getElementById('staffResultsList').innerHTML=html; }
    window.exportSlipPDF=(rid)=>{ const element=document.getElementById(`slip-${rid}`); html2pdf().from(element).save('result.pdf'); };
    loadStudentsForStaff();
    function showStaffSection(section){ ['addStudent','addResult','viewResults'].forEach(sec=>document.getElementById(sec).style.display='none'); document.getElementById(section).style.display='block'; }
</script>
{% endblock %}
