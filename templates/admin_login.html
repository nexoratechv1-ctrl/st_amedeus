<!-- templates/admin_login.html -->
{% extends "base.html" %}
{% block content %}
<div class="container auth-container">
    <div class="glass-card"><h2>Admin Login</h2><input type="text" id="username" placeholder="Username"><input type="password" id="password" placeholder="Password"><button onclick="login()">Login</button></div>
</div>
<script>
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const res = await fetch('/api/admin/auth', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
        if(res.ok){ const data = await res.json(); localStorage.setItem('token', data.token); localStorage.setItem('role','admin'); window.location.href='/admin/dashboard'; }
        else alert('Invalid credentials');
    }
</script>
{% endblock %}
