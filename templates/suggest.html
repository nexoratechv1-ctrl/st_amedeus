{% extends "base.html" %}
{% block content %}
<div class="container mt-5 pt-5">
    <div class="section-title"><h2>Sanduku la Maoni (Siri Kamili)</h2><p>Tuma maoni yako bila kujulikana</p></div>
    <div class="row"><div class="col-md-8 mx-auto">
        <div class="card"><div class="card-body">
            <form method="POST">
                <div class="mb-3"><label>Kategoria</label><select name="category" class="form-select"><option>general</option><option>complaint</option><option>suggestion</option><option>praise</option></select></div>
                <div class="mb-3"><label>Maoni yako</label><textarea name="content" rows="5" class="form-control" required></textarea></div>
                <button type="submit" class="btn btn-gold w-100">Tuma kwa Usiri</button>
            </form>
        </div></div>
    </div></div>
</div>
{% endblock %}
